name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency: { group: deploy-main, cancel-in-progress: false }

permissions:
  id-token: write
  contents: read

jobs:
  deploy-backend:
    name: Deploy Backend to AWS
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: cd backend && pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: >-
            arn:aws:iam::216890067629:role/OIDC-MERCADO-EXPRESS
          aws-region: us-east-1

      - name: Deploy to AWS
        run: |
          cd backend && pnpm cdk:deploy \
            --context stackName=PocSemanticSearchStackV2 \
            --context databaseSecretArn=${{ vars.DATABASE_SECRET_ARN }} \
            --context geminiSecretArn=${{ vars.GEMINI_SECRET_ARN }} \
            --require-approval never

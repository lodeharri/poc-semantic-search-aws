name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (root)
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (backend)
        run: cd backend && pnpm install --frozen-lockfile

      - name: Lint
        run: cd backend && pnpm lint

      - name: Type check
        run: cd backend && pnpm type-check

      - name: Test with coverage
        run: cd backend && pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/coverage-final.json
          flags: backend
        continue-on-error: true

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (root)
        run: pnpm install --frozen-lockfile

      - name: Install dependencies (frontend)
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Lint
        run: cd frontend && pnpm lint
        continue-on-error: true

      - name: Type check
        run: cd frontend && pnpm type-check

      - name: Build
        run: cd frontend && pnpm build

  cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies (backend)
        run: cd backend && pnpm install --frozen-lockfile

      - name: CDK Synth
        run: cd backend && pnpm cdk:synth --context stackName=PocSemanticSearchStackV2 --context databaseSecretArn=${{ vars.DATABASE_SECRET_ARN }} --context geminiSecretArn=${{ vars.GEMINI_SECRET_ARN }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
